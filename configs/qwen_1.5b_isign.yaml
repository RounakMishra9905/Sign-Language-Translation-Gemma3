# Data Configuration
data:
  train_path: "/DATACSEShare/sanjeet/dattatreya/jan8A40/rtmfeaturesisign/translationexperiment/tokenization/train_split_unicode_filtered_matched.csv"
  val_path: "/DATACSEShare/sanjeet/dattatreya/jan8A40/rtmfeaturesisign/translationexperiment/tokenization/val_split_unicode_filtered_matched.csv"
  test_path: "/DATACSEShare/sanjeet/dattatreya/jan8A40/rtmfeaturesisign/translationexperiment/tokenization/test_split_unicode_filtered_matched.csv"
  pose_dir: "/DATACSEShare/sanjeet/dattatreya/jan8A40/rtmfeaturesisign/performance"
  
  # --- CRITICAL FIX 1: SHRINK THE PAD LIMIT ---
  max_frames: 75     # MUST be reduced to match step_frames (300 / 4 = 75)
  step_frames: 4     # Skips frames to speed up processing
  
  max_length: 128
  num_keypoints: 266

# Model Configuration
model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"  
  tokenizer: "Qwen/Qwen2.5-1.5B-Instruct"
  dropout: 0.1
  freeze_encoder: false
  freeze_decoder: false  
  use_lora: true
  lora_config:
    r: 16
    lora_alpha: 32
    target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    lora_dropout: 0.1
    bias: "none"
  load_in_8bit: false
  load_in_4bit: false  
  params: {}

# Training Configuration
training:
  num_epochs: 50
  batch_size: 4
  learning_rate: 5e-5
  weight_decay: 0.01
  betas: [0.9, 0.999]
  max_grad_norm: 1.0
  gradient_accumulation_steps: 4  
  mixed_precision: true
  warmup_ratio: 0.1
  checkpoint_dir: "checkpoints/qwen_1.5b_isign"
  save_every: 4
  eval_every: 2
  
  # --- CRITICAL FIX 2: TURN OFF BEAM SEARCH ---
  num_beams: 1       # Changed from 5 to 1. Drops eval time from 2.5 hours to 15 mins.
  max_gen_length: 64 # Stop it from writing massive essays during validation
  
  use_wandb: true
  project_name: "sign-language-translation"
  run_name: "qwen_1.5b_isign_fast"
  num_workers: 4

seed: 42